<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <!-- Neuron glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Activation pulse -->
    <radialGradient id="pulse-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pulse-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pulse-green" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>

    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a0f2e"/>
    </linearGradient>

    <!-- Synapse gradient -->
    <linearGradient id="syn-active" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.1"/>
      <stop offset="40%" stop-color="#a855f7" stop-opacity="0.8">
        <animate attributeName="offset" values="0;1;0" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="syn-secondary" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.4">
        <animate attributeName="offset" values="0;1;0" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="16"/>

  <!-- Grid pattern (subtle) -->
  <g opacity="0.03" stroke="#a855f7">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
  </g>

  <!-- ══════════ SYNAPSES (connections) ══════════ -->
  <g fill="none" stroke-width="1.5" stroke-linecap="round">
    <!-- Primary synapses (active path) -->
    <line x1="400" y1="190" x2="280" y2="140" stroke="url(#syn-active)" stroke-width="2.5"/>
    <line x1="400" y1="190" x2="520" y2="120" stroke="url(#syn-active)" stroke-width="2.5"/>
    <line x1="400" y1="190" x2="340" y2="290" stroke="url(#syn-active)" stroke-width="2"/>
    <line x1="400" y1="190" x2="490" y2="270" stroke="url(#syn-active)" stroke-width="2"/>
    <line x1="400" y1="190" x2="300" y2="210" stroke="url(#syn-active)" stroke-width="1.5"/>
    <line x1="400" y1="190" x2="510" y2="200" stroke="url(#syn-active)" stroke-width="1.5"/>

    <!-- Secondary synapses -->
    <line x1="280" y1="140" x2="170" y2="100" stroke="url(#syn-secondary)" stroke-width="1.5"/>
    <line x1="280" y1="140" x2="200" y2="210" stroke="url(#syn-secondary)" stroke-width="1"/>
    <line x1="280" y1="140" x2="220" y2="60" stroke="url(#syn-secondary)" stroke-width="1"/>
    <line x1="520" y1="120" x2="620" y2="80" stroke="url(#syn-secondary)" stroke-width="1.5"/>
    <line x1="520" y1="120" x2="600" y2="180" stroke="url(#syn-secondary)" stroke-width="1"/>
    <line x1="520" y1="120" x2="580" y2="50" stroke="url(#syn-secondary)" stroke-width="1"/>
    <line x1="340" y1="290" x2="250" y2="330" stroke="url(#syn-secondary)" stroke-width="1"/>
    <line x1="340" y1="290" x2="380" y2="350" stroke="url(#syn-secondary)" stroke-width="1"/>
    <line x1="490" y1="270" x2="560" y2="320" stroke="url(#syn-secondary)" stroke-width="1"/>
    <line x1="490" y1="270" x2="600" y2="250" stroke="url(#syn-secondary)" stroke-width="1"/>
    <line x1="300" y1="210" x2="200" y2="210" stroke="url(#syn-secondary)" stroke-width="1"/>
    <line x1="510" y1="200" x2="600" y2="180" stroke="url(#syn-secondary)" stroke-width="1"/>

    <!-- Tertiary synapses (faint) -->
    <line x1="170" y1="100" x2="100" y2="60" stroke="#3b82f6" stroke-opacity="0.12" stroke-width="0.8"/>
    <line x1="170" y1="100" x2="120" y2="160" stroke="#3b82f6" stroke-opacity="0.12" stroke-width="0.8"/>
    <line x1="620" y1="80" x2="700" y2="50" stroke="#3b82f6" stroke-opacity="0.12" stroke-width="0.8"/>
    <line x1="620" y1="80" x2="690" y2="130" stroke="#3b82f6" stroke-opacity="0.12" stroke-width="0.8"/>
    <line x1="250" y1="330" x2="180" y2="360" stroke="#3b82f6" stroke-opacity="0.08" stroke-width="0.8"/>
    <line x1="560" y1="320" x2="640" y2="350" stroke="#3b82f6" stroke-opacity="0.08" stroke-width="0.8"/>
  </g>

  <!-- ══════════ NEURONS ══════════ -->

  <!-- Central neuron (query anchor) — largest, brightest -->
  <circle cx="400" cy="190" r="28" fill="url(#pulse-purple)" opacity="0.4">
    <animate attributeName="r" values="28;36;28" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.2;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="190" r="14" fill="#a855f7" filter="url(#glow-strong)">
    <animate attributeName="r" values="14;16;14" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="190" r="5" fill="#e9d5ff"/>

  <!-- Primary neurons (1-hop, high activation) -->
  <g filter="url(#glow)">
    <!-- Decision neuron -->
    <circle cx="280" cy="140" r="20" fill="url(#pulse-purple)" opacity="0.3">
      <animate attributeName="r" values="20;26;20" dur="2.5s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="280" cy="140" r="10" fill="#c084fc">
      <animate attributeName="r" values="10;12;10" dur="2.5s" repeatCount="indefinite" begin="0.3s"/>
    </circle>

    <!-- Insight neuron -->
    <circle cx="520" cy="120" r="20" fill="url(#pulse-purple)" opacity="0.3">
      <animate attributeName="r" values="20;26;20" dur="2.8s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="520" cy="120" r="10" fill="#c084fc">
      <animate attributeName="r" values="10;12;10" dur="2.8s" repeatCount="indefinite" begin="0.5s"/>
    </circle>

    <!-- Error neuron -->
    <circle cx="340" cy="290" r="18" fill="url(#pulse-blue)" opacity="0.25">
      <animate attributeName="r" values="18;24;18" dur="3s" repeatCount="indefinite" begin="0.7s"/>
    </circle>
    <circle cx="340" cy="290" r="9" fill="#60a5fa">
      <animate attributeName="r" values="9;11;9" dur="3s" repeatCount="indefinite" begin="0.7s"/>
    </circle>

    <!-- Workflow neuron -->
    <circle cx="490" cy="270" r="18" fill="url(#pulse-blue)" opacity="0.25">
      <animate attributeName="r" values="18;24;18" dur="2.6s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
    <circle cx="490" cy="270" r="9" fill="#60a5fa">
      <animate attributeName="r" values="9;11;9" dur="2.6s" repeatCount="indefinite" begin="0.4s"/>
    </circle>

    <!-- Fact neurons -->
    <circle cx="300" cy="210" r="8" fill="#818cf8"/>
    <circle cx="510" cy="200" r="8" fill="#818cf8"/>
  </g>

  <!-- Secondary neurons (2-hop, medium activation) -->
  <g opacity="0.7">
    <circle cx="170" cy="100" r="7" fill="#60a5fa"/>
    <circle cx="200" cy="210" r="6" fill="#60a5fa"/>
    <circle cx="220" cy="60" r="5" fill="#818cf8"/>
    <circle cx="620" cy="80" r="7" fill="#60a5fa"/>
    <circle cx="600" cy="180" r="6" fill="#60a5fa"/>
    <circle cx="580" cy="50" r="5" fill="#818cf8"/>
    <circle cx="250" cy="330" r="6" fill="#60a5fa"/>
    <circle cx="380" cy="350" r="5" fill="#818cf8"/>
    <circle cx="560" cy="320" r="6" fill="#60a5fa"/>
    <circle cx="600" cy="250" r="5" fill="#818cf8"/>
  </g>

  <!-- Tertiary neurons (3-hop, faint) -->
  <g opacity="0.3">
    <circle cx="100" cy="60" r="4" fill="#6366f1"/>
    <circle cx="120" cy="160" r="3.5" fill="#6366f1"/>
    <circle cx="700" cy="50" r="4" fill="#6366f1"/>
    <circle cx="690" cy="130" r="3.5" fill="#6366f1"/>
    <circle cx="180" cy="360" r="3" fill="#6366f1"/>
    <circle cx="640" cy="350" r="3" fill="#6366f1"/>
  </g>

  <!-- ══════════ ACTIVATION WAVE ══════════ -->
  <circle cx="400" cy="190" r="10" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0">
    <animate attributeName="r" values="10;180" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="190" r="10" fill="none" stroke="#a855f7" stroke-width="1" opacity="0">
    <animate attributeName="r" values="10;180" dur="3s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0.4;0" dur="3s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="400" cy="190" r="10" fill="none" stroke="#a855f7" stroke-width="0.8" opacity="0">
    <animate attributeName="r" values="10;180" dur="3s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" values="0.3;0" dur="3s" repeatCount="indefinite" begin="2s"/>
  </circle>

  <!-- ══════════ TEXT ══════════ -->

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#f8fafc" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="3" opacity="0.7">NEURAL MEMORY</text>

  <!-- Labels on neurons -->
  <text x="400" y="165" text-anchor="middle" fill="#e9d5ff" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="9" font-weight="600">QUERY</text>
  <text x="280" y="122" text-anchor="middle" fill="#ddd6fe" font-family="'JetBrains Mono', monospace" font-size="8" opacity="0.8">decision</text>
  <text x="520" y="102" text-anchor="middle" fill="#ddd6fe" font-family="'JetBrains Mono', monospace" font-size="8" opacity="0.8">insight</text>
  <text x="340" y="312" text-anchor="middle" fill="#bfdbfe" font-family="'JetBrains Mono', monospace" font-size="8" opacity="0.7">error</text>
  <text x="490" y="254" text-anchor="middle" fill="#bfdbfe" font-family="'JetBrains Mono', monospace" font-size="8" opacity="0.7">workflow</text>

  <!-- Tagline -->
  <text x="400" y="388" text-anchor="middle" fill="#a78bfa" font-family="'Inter', system-ui, sans-serif" font-size="11" opacity="0.6">Retrieval through activation, not search</text>
</svg>
